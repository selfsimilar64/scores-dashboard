<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Averages - Gymfest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/shared.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-header .card-title {
            margin-bottom: 0;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .controls select {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .controls select:focus {
            outline: none;
            border-color: var(--accent-secondary);
        }

        /* Table styles */
        .table-container {
            overflow: auto;
            max-height: calc(100vh - 320px);
            min-height: 300px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        th, td {
            padding: 12px 10px;
            text-align: center;
        }

        th {
            background: var(--bg-elevated);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th:first-child {
            text-align: left;
            min-width: 200px;
            position: sticky;
            left: 0;
            z-index: 20;
            background: var(--bg-elevated);
            box-shadow: 2px 0 6px rgba(0, 0, 0, 0.06);
        }

        td {
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        td:first-child {
            text-align: left;
            font-weight: 500;
            position: sticky;
            left: 0;
            z-index: 5;
            background: var(--bg-surface);
            box-shadow: 2px 0 6px rgba(0, 0, 0, 0.06);
        }

        tr:hover td:first-child {
            background: var(--bg-surface);
        }

        tr:hover td {
            background: rgba(61, 90, 128, 0.04);
        }

        .meet-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .meet-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Override shared score-value size for averages table */
        .score-cell .score-value {
            font-size: 0.95rem;
        }

        .score-cell.has-value {
            color: var(--text-primary);
        }

        .score-cell.no-value {
            color: var(--text-muted);
        }

        /* Column max - gold highlight (same as year-pb) */
        .score-cell.col-max .score-value {
            color: var(--accent-gold);
            background: var(--accent-gold-bg);
            font-weight: 600;
        }

        /* Table max - gold + star (same as alltime-pb) */
        .score-cell.table-max .score-value {
            color: var(--accent-gold);
            background: var(--accent-gold-bg);
            font-weight: 700;
            position: relative;
            padding-left: 18px;
        }

        .score-cell.table-max .score-value::before {
            content: '\2605';
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            line-height: 1;
            color: var(--accent-gold-bright);
        }

        .score-cell.col-max .score-minor,
        .score-cell.table-max .score-minor {
            color: inherit;
            opacity: 0.7;
        }

        .gymfest-col {
            background: rgba(100, 210, 255, 0.05);
            border-left: 2px solid var(--accent-interactive);
        }

        th.gymfest-col {
            color: var(--accent-interactive);
            background: rgba(61, 90, 128, 0.06);
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
        }

        /* Level group colors */
        .level-group-compulsory th {
            color: var(--accent-success);
        }

        .level-group-optional th {
            color: var(--accent-warning);
        }

        .level-group-xcel th {
            color: var(--accent-primary);
        }

        /* Tooltip */
        .score-cell.team-score {
            cursor: pointer;
            position: relative;
        }

        .score-cell.team-score:hover {
            background: rgba(61, 90, 128, 0.08);
        }

        .tooltip {
            position: fixed;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            pointer-events: none;
            min-width: 220px;
            max-width: 340px;
        }

        .tooltip-title {
            font-weight: 600;
            color: var(--accent-interactive);
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }

        .tooltip-athlete {
            color: var(--text-primary);
        }

        .tooltip-score {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-variant-numeric: tabular-nums;
            color: var(--accent-gold);
            font-weight: 500;
        }

        .tooltip-total {
            border-top: 1px solid var(--border-color);
            margin-top: 8px;
            padding-top: 8px;
            font-weight: 600;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-swatch {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .legend-swatch.gold {
            background: var(--accent-gold-bg);
            border: 2px solid var(--accent-gold);
        }

        .legend-swatch.star {
            background: var(--accent-gold-bg);
            border: 2px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-gold-bright);
            font-size: 8px;
        }

        /* Chart */
        .chart-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
        }

        .chart-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }

        .chart-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            transition: opacity 0.2s;
        }

        .chart-legend-item:hover {
            background: var(--bg-elevated);
        }

        .chart-legend-item.hidden {
            opacity: 0.35;
        }

        .chart-legend-swatch {
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .controls {
                flex-wrap: wrap;
                width: 100%;
            }

            .controls select {
                flex: 1;
                min-width: 120px;
            }

            .chart-container {
                aspect-ratio: auto;
                height: 350px;
            }
        }

        /* Landscape phone optimization */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding: 8px 12px;
            }

            .card {
                padding: 10px;
                margin-bottom: 0;
            }

            .card-header {
                margin-bottom: 6px;
            }

            .card-title {
                font-size: 0.95rem;
            }

            .controls {
                gap: 6px;
            }

            .controls label {
                font-size: 0.75rem;
            }

            .controls select {
                padding: 5px 8px;
                font-size: 0.8rem;
            }

            .table-container {
                max-height: calc(100vh - 110px);
                min-height: 120px;
            }

            th, td {
                padding: 6px 5px;
                font-size: 0.75rem;
            }

            th:first-child {
                min-width: 120px;
            }

            .meet-name {
                font-size: 0.8rem;
            }

            .meet-date {
                font-size: 0.65rem;
            }

            .score-cell {
                font-size: 0.8rem;
            }

            .legend {
                font-size: 0.7rem;
                gap: 10px;
                margin-bottom: 6px;
            }

            .legend-swatch {
                width: 10px;
                height: 10px;
            }

            .chart-container {
                aspect-ratio: auto;
                height: 250px;
            }

            .chart-legend {
                font-size: 0.7rem;
                gap: 6px;
                margin-bottom: 6px;
            }
        }

        /* Small phones */
        @media (max-width: 480px) {
            .card {
                padding: 16px;
                border-radius: 8px;
            }

            .card-title {
                font-size: 1rem;
            }

            table {
                min-width: 800px;
            }

            .table-container {
                margin: 0 -16px;
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="card-title">All Around Averages by Level</div>
                <div class="controls">
                    <label for="displayMode">Show:</label>
                    <select id="displayMode">
                        <option value="avg">Avg All Around</option>
                        <option value="median">Sum of Event Medians</option>
                        <option value="team">Team Score</option>
                    </select>
                    <label for="compYearSelect">Comp Year:</label>
                    <select id="compYearSelect">
                        <option value="2026">2026</option>
                    </select>
                </div>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-swatch gold"></span>
                    <span>Column Best</span>
                </div>
                <div class="legend-item">
                    <span class="legend-swatch star">&#9733;</span>
                    <span>Table Best (excl. Gymfest)</span>
                </div>
            </div>

            <div id="content">
                <div class="loading">
                    <p>Loading meet averages...</p>
                </div>
            </div>
        </div>

        <!-- Chart Card -->
        <div class="card" id="chartCard" style="display: none;">
            <div class="card-title">Progression</div>
            <div class="chart-legend" id="chartLegend"></div>
            <div class="chart-container">
                <canvas id="averagesChart"></canvas>
            </div>
        </div>
    </div>

    <script src="/shared.js"></script>
    <script>
        let currentCompYear = '2026';
        let displayMode = 'avg'; // 'avg', 'median', or 'team'
        let meetsData = null;
        let levelOrder = null;
        let chart = null;
        let hiddenLevels = new Set();

        async function loadMeetAverages() {
            try {
                const response = await fetch(`/api/meet_level_averages?comp_year=${currentCompYear}`);
                const data = await response.json();
                
                // Populate comp year dropdown
                const select = document.getElementById('compYearSelect');
                select.innerHTML = data.all_comp_years.map(year => 
                    `<option value="${year}" ${year === data.comp_year ? 'selected' : ''}>${year}</option>`
                ).join('');
                
                if (!data.meets || data.meets.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="empty-state">
                            <h3>No Data</h3>
                            <p>No meet data found for ${currentCompYear}</p>
                        </div>
                    `;
                    document.getElementById('chartCard').style.display = 'none';
                    if (chart) { chart.destroy(); chart = null; }
                    return;
                }
                
                // Store data for re-rendering on mode change
                meetsData = data.meets;
                levelOrder = data.level_order;
                
                renderTable();
                renderChart();
            } catch (error) {
                console.error('Error loading meet averages:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <h3>Error</h3>
                        <p>Failed to load meet averages</p>
                    </div>
                `;
            }
        }

        function getDisplayValue(levelData, meet) {
            // Returns the value to display for a level cell based on current mode
            if (displayMode === 'team') return levelData ? levelData.team_score : null;
            if (displayMode === 'median') return levelData ? levelData.median : null;
            return levelData ? levelData.avg : null;
        }

        function getGymfestValue(meet) {
            if (displayMode === 'team') return meet.gymfest_team_score;
            if (displayMode === 'median') return meet.gymfest_median;
            return meet.gymfest_avg;
        }

        function renderTable() {
            const isTeamMode = displayMode === 'team';
            
            // Calculate max values for each column (excluding Gymfest for table max)
            const columnMaxes = {};
            let tableMax = { value: -Infinity, meetIdx: -1, level: null };
            
            // Initialize column maxes
            levelOrder.forEach(level => {
                columnMaxes[level] = { value: -Infinity, meetIdx: -1 };
            });
            columnMaxes['gymfest'] = { value: -Infinity, meetIdx: -1 };
            
            // Find max values
            meetsData.forEach((meet, meetIdx) => {
                levelOrder.forEach(level => {
                    const levelData = meet.levels[level];
                    if (levelData) {
                        const value = getDisplayValue(levelData, meet);
                        if (value !== null && value !== undefined) {
                            const numVal = parseFloat(value);
                            if (numVal > columnMaxes[level].value) {
                                columnMaxes[level] = { value: numVal, meetIdx };
                            }
                            // Track table max (excluding Gymfest)
                            if (numVal > tableMax.value) {
                                tableMax = { value: numVal, meetIdx, level };
                            }
                        }
                    }
                });
                
                // Track Gymfest column max (but don't include in table max)
                const gymfestValue = getGymfestValue(meet);
                if (gymfestValue !== null && gymfestValue !== undefined) {
                    const numVal = parseFloat(gymfestValue);
                    if (numVal > columnMaxes['gymfest'].value) {
                        columnMaxes['gymfest'] = { value: numVal, meetIdx };
                    }
                }
            });
            
            let html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Meet</th>
            `;
            
            // Add level headers
            levelOrder.forEach(level => {
                html += `<th>${level}</th>`;
            });
            
            // Add Gymfest column
            html += `<th class="gymfest-col">Gymfest</th>`;
            html += `</tr></thead><tbody>`;
            
            // Add rows for each meet
            meetsData.forEach((meet, meetIdx) => {
                const dateDisplay = formatMeetDates(meet.meet_dates || [meet.meet_date]);
                html += `
                    <tr>
                        <td>
                            <div class="meet-name">${meet.meet_name}</div>
                            <div class="meet-date">${dateDisplay}</div>
                        </td>
                `;
                
                // Add score cells for each level
                levelOrder.forEach((level, levelIdx) => {
                    const levelData = meet.levels[level];
                    if (levelData) {
                        const value = getDisplayValue(levelData, meet);
                        if (value !== null && value !== undefined) {
                            let cellClass = isTeamMode ? 'score-cell has-value team-score' : 'score-cell has-value';
                            const dataAttr = isTeamMode ? `data-meet="${meetIdx}" data-level="${level}"` : '';
                            
                            // Check if this is the table max (turquoise) or column max (gold)
                            const isTableMax = tableMax.meetIdx === meetIdx && tableMax.level === level;
                            const isColMax = columnMaxes[level].meetIdx === meetIdx;
                            
                            if (isTableMax) {
                                cellClass += ' table-max';
                            } else if (isColMax) {
                                cellClass += ' col-max';
                            }
                            
                            const dp = isTeamMode ? 1 : 2;
                            html += `<td class="${cellClass}" ${dataAttr}><span class="score-value">${formatScoreHtml(value, dp)}</span></td>`;
                        } else {
                            html += `<td class="score-cell no-value">—</td>`;
                        }
                    } else {
                        html += `<td class="score-cell no-value">—</td>`;
                    }
                });
                
                // Add Gymfest column
                const gymfestValue = getGymfestValue(meet);
                if (gymfestValue !== null && gymfestValue !== undefined) {
                    let gymfestClass = isTeamMode ? 'score-cell has-value gymfest-col team-score' : 'score-cell has-value gymfest-col';
                    const gymfestDataAttr = isTeamMode ? `data-meet="${meetIdx}" data-level="gymfest"` : '';
                    
                    // Only gold for Gymfest column (not included in table max)
                    if (columnMaxes['gymfest'].meetIdx === meetIdx) {
                        gymfestClass += ' col-max';
                    }
                    
                    const gfDp = isTeamMode ? 1 : 2;
                    html += `<td class="${gymfestClass}" ${gymfestDataAttr}><span class="score-value">${formatScoreHtml(gymfestValue, gfDp)}</span></td>`;
                } else {
                    html += `<td class="score-cell no-value gymfest-col">—</td>`;
                }
                
                html += `</tr>`;
            });
            
            html += `</tbody></table></div>`;
            
            document.getElementById('content').innerHTML = html;
            
            // Add tooltip listeners if in team mode
            if (isTeamMode) {
                setupTooltips();
            }
        }

        function setupTooltips() {
            const tooltip = document.createElement('div');
            tooltip.className = 'tooltip';
            tooltip.style.display = 'none';
            document.body.appendChild(tooltip);

            document.querySelectorAll('.team-score').forEach(cell => {
                cell.addEventListener('mouseenter', (e) => {
                    const meetIdx = parseInt(cell.dataset.meet);
                    const level = cell.dataset.level;
                    const meet = meetsData[meetIdx];
                    
                    let eventTop3, teamScore, title;
                    
                    if (level === 'gymfest') {
                        if (!meet.gymfest_event_top3) return;
                        eventTop3 = meet.gymfest_event_top3;
                        teamScore = meet.gymfest_team_score;
                        title = 'Team Score - All Levels';
                    } else {
                        const levelData = meet.levels[level];
                        if (!levelData || !levelData.event_top3) return;
                        eventTop3 = levelData.event_top3;
                        teamScore = levelData.team_score;
                        title = `Team Score - Level ${level}`;
                    }
                    
                    let tooltipHtml = `<div class="tooltip-title">${title}</div>`;
                    const events = ['Vault', 'Bars', 'Beam', 'Floor'];
                    events.forEach(event => {
                        const top3 = eventTop3[event];
                        if (!top3) return;
                        const eventSum = top3.reduce((s, item) => s + parseFloat(item.score), 0);
                        // Build athlete badges
                        const badgesHtml = top3.map(item => {
                            const lc = getLevelColor(level !== 'gymfest' ? level : (item.level || ''));
                            return `<span style="display:inline-block;padding:2px 6px;border-radius:5px;font-size:0.75rem;font-weight:600;color:${lc.text};background:${lc.bg};margin-right:3px;">${firstName(item.athlete)}</span>`;
                        }).join('');
                        tooltipHtml += `
                            <div class="tooltip-row">
                                <span class="tooltip-athlete">${event}</span>
                                <span style="font-family:'Plus Jakarta Sans',sans-serif;font-variant-numeric:tabular-nums;font-weight:600;color:var(--text-primary);">${toFixed(eventSum, 2)}</span>
                            </div>
                            <div style="padding-left:12px;padding-bottom:6px;line-height:1.8;">
                                ${badgesHtml}
                            </div>
                        `;
                    });
                    tooltipHtml += `
                        <div class="tooltip-row tooltip-total">
                            <span>Total</span>
                            <span style="font-family:'Plus Jakarta Sans',sans-serif;font-variant-numeric:tabular-nums;font-weight:600;color:var(--text-primary);">${toFixed(teamScore, 2)}</span>
                        </div>
                    `;
                    
                    tooltip.innerHTML = tooltipHtml;
                    tooltip.style.display = 'block';
                    
                    // Position tooltip
                    const rect = cell.getBoundingClientRect();
                    let left = rect.left + rect.width / 2;
                    let top = rect.top - tooltip.offsetHeight - 10;
                    
                    // Keep within viewport
                    if (top < 10) top = rect.bottom + 10;
                    if (left + tooltip.offsetWidth / 2 > window.innerWidth - 10) {
                        left = window.innerWidth - tooltip.offsetWidth - 10;
                    } else {
                        left -= tooltip.offsetWidth / 2;
                    }
                    if (left < 10) left = 10;
                    
                    tooltip.style.left = left + 'px';
                    tooltip.style.top = top + 'px';
                });
                
                cell.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });
            });
        }

        function renderChart() {
            const chartCard = document.getElementById('chartCard');
            if (!meetsData || meetsData.length === 0 || !levelOrder || levelOrder.length === 0) {
                chartCard.style.display = 'none';
                return;
            }
            chartCard.style.display = 'block';

            // X-axis: meet names
            const labels = meetsData.map(m => m.meet_name);

            // Build datasets: one line per level + Gymfest
            const datasets = [];
            const isTeamMode = displayMode === 'team';

            levelOrder.forEach(level => {
                const color = getLevelChartColor(level);
                const data = meetsData.map(meet => {
                    const ld = meet.levels[level];
                    if (!ld) return null;
                    const val = getDisplayValue(ld, meet);
                    return val !== null && val !== undefined ? parseFloat(val) : null;
                });
                // Only add if there's at least one data point
                if (data.some(v => v !== null)) {
                    datasets.push({
                        label: level,
                        data,
                        borderColor: color,
                        backgroundColor: color,
                        borderWidth: 3,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointBackgroundColor: color,
                        pointBorderColor: color,
                        tension: 0.25,
                        spanGaps: true,
                        hidden: hiddenLevels.has(level)
                    });
                }
            });

            // Calculate Y-axis range
            let allValues = [];
            datasets.forEach(ds => {
                if (!ds.hidden) {
                    ds.data.forEach(v => { if (v !== null) allValues.push(v); });
                }
            });
            if (allValues.length === 0) allValues = [0, 10];

            const dataMin = Math.min(...allValues);
            const dataMax = Math.max(...allValues);
            const range = dataMax - dataMin;
            const padding = Math.max(range * 0.15, isTeamMode ? 2 : 0.5);
            const yMin = Math.max(0, Math.floor((dataMin - padding) * 2) / 2);
            const yMax = Math.ceil((dataMax + padding) * 2) / 2;

            if (chart) chart.destroy();

            const ctx = document.getElementById('averagesChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { left: 4, right: 4, top: 8, bottom: 4 }
                    },
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#ffffff',
                            titleColor: '#1c1c1e',
                            bodyColor: '#1c1c1e',
                            borderColor: '#e8e8e6',
                            borderWidth: 1,
                            titleFont: { family: 'Plus Jakarta Sans', size: 14, weight: '600' },
                            bodyFont: { family: 'Plus Jakarta Sans', size: 13, weight: '500' },
                            padding: 12,
                            cornerRadius: 10,
                            itemSort: (a, b) => (b.raw || 0) - (a.raw || 0),
                            filter: (item) => item.raw !== null,
                            callbacks: {
                                label: function(ctx) {
                                    return ` ${ctx.dataset.label}: ${toFixed(ctx.parsed.y, isTeamMode ? 1 : 2)}`;
                                },
                                labelColor: function(ctx) {
                                    return {
                                        borderColor: ctx.dataset.borderColor,
                                        backgroundColor: ctx.dataset.borderColor,
                                        borderWidth: 2,
                                        borderRadius: 2
                                    };
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#6b6b73',
                                font: { family: 'Plus Jakarta Sans', size: 14, weight: '600' },
                                maxRotation: 45
                            },
                            grid: { color: 'rgba(0, 0, 0, 0.05)' }
                        },
                        y: {
                            ticks: {
                                color: '#6b6b73',
                                font: { family: 'Plus Jakarta Sans', size: 14, weight: '500' },
                                callback: v => toFixed(v, isTeamMode ? 0 : 1),
                                padding: 8
                            },
                            grid: { color: 'rgba(0, 0, 0, 0.05)' },
                            min: yMin,
                            max: yMax
                        }
                    }
                }
            });

            renderChartLegend(datasets);
        }

        function renderChartLegend(datasets) {
            const el = document.getElementById('chartLegend');
            el.innerHTML = datasets.map(ds => {
                const isHidden = hiddenLevels.has(ds.label);
                return `<div class="chart-legend-item ${isHidden ? 'hidden' : ''}" onclick="toggleLevel('${ds.label}')">
                    <span class="chart-legend-swatch" style="background: ${ds.borderColor};"></span>
                    <span style="color: ${isHidden ? 'var(--text-muted)' : ds.borderColor};">${ds.label}</span>
                </div>`;
            }).join('');
        }

        function toggleLevel(level) {
            if (hiddenLevels.has(level)) {
                hiddenLevels.delete(level);
            } else {
                hiddenLevels.add(level);
            }
            renderChart();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMeetAverages();
            
            document.getElementById('compYearSelect').addEventListener('change', (e) => {
                currentCompYear = e.target.value;
                loadMeetAverages();
            });
            
            document.getElementById('displayMode').addEventListener('change', (e) => {
                displayMode = e.target.value;
                if (meetsData) {
                    // Remove existing tooltip if any
                    const existingTooltip = document.querySelector('.tooltip');
                    if (existingTooltip) existingTooltip.remove();
                    renderTable();
                    renderChart();
                }
            });
        });
    </script>
