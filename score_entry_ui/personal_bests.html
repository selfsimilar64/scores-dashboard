<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Scores - Gymfest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(48, 209, 88, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-warning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .nav-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--accent-secondary);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--accent-gold), var(--accent-success));
            border-radius: 2px;
        }

        .meet-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meet-selector label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        select {
            background: var(--bg-elevated);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-primary);
            cursor: pointer;
            min-width: 250px;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .meet-info {
            background: var(--bg-elevated);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .meet-info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .meet-info-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meet-info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-elevated);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            border-color: var(--text-muted);
        }

        .filter-tab.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--bg-dark);
            font-weight: 600;
        }

        /* Table styles */
        .table-container {
            overflow: auto;
            max-height: calc(100vh - 400px);
            min-height: 300px;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-elevated) transparent;
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: var(--bg-elevated);
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .table-container::-webkit-scrollbar-corner {
            background: transparent;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
        }

        th {
            background: var(--bg-elevated);
            font-weight: 600;
            font-size: 0.94rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Athlete and Level columns shrink to content */
        th:first-child, td:first-child,
        th:nth-child(2), td:nth-child(2) {
            white-space: nowrap;
            width: 1%;
        }

        th:first-child {
            position: sticky;
            left: 0;
            z-index: 20;
            background: var(--bg-elevated);
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.3);
        }

        td {
            border-bottom: 1px solid var(--border-color);
            font-size: 1.05rem;
        }

        td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            background: var(--bg-card);
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.3);
        }

        tr:hover td:first-child {
            background: var(--bg-card);
        }

        tr:hover td {
            background: rgba(100, 210, 255, 0.04);
        }

        .athlete-link {
            text-decoration: none;
            color: inherit;
        }

        .athlete-link:hover .athlete-name {
            filter: brightness(1.2);
        }

        .athlete-name {
            display: inline-block;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
            transition: filter 0.15s;
        }

        .level-col {
            white-space: nowrap;
        }

        .event-name {
            color: var(--text-secondary);
        }

        .score {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 1.21rem;
            color: var(--accent-gold);
        }

        .improvement {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-success);
        }

        .improvement::before {
            content: '+';
        }

        .first-meet {
            font-size: 0.8rem;
            color: var(--accent-secondary);
            font-style: italic;
        }

        .place {
            font-family: 'JetBrains Mono', monospace;
        }

        .place-1 { color: var(--accent-gold); font-weight: 700; }
        .place-2 { color: #c0c0c0; font-weight: 600; }
        .place-3 { color: #cd7f32; font-weight: 600; }

        .tooltip-grid .empty-cell {
            /* placeholder for alignment when no improvement */
        }

        /* Toggle switch styles */
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-elevated);
            border: 2px solid var(--border-color);
            border-radius: 26px;
            transition: 0.3s;
        }

        .toggle-slider::before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(22px);
            background-color: var(--bg-dark);
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            header h1 {
                font-size: 1.8rem;
            }

            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .meet-selector {
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
            }

            .meet-selector select {
                width: 100%;
                min-width: unset;
            }

            .meet-info {
                gap: 16px;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .stat-card {
                padding: 12px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .stat-label {
                font-size: 0.75rem;
            }
        }

        /* Landscape phone optimization */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding: 8px 12px;
            }

            header {
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 8px;
                text-align: left;
            }

            header h1 {
                font-size: 1.2rem;
                margin-bottom: 0;
            }

            header p {
                display: none;
            }

            .nav-links {
                margin-top: 0;
                gap: 12px;
            }

            .nav-link {
                font-size: 0.8rem;
            }

            .card {
                padding: 10px;
                margin-bottom: 0;
            }

            .card-header {
                margin-bottom: 6px;
                flex-direction: row;
                align-items: center;
            }

            .card-title {
                font-size: 0.95rem;
            }

            .card-title::before {
                width: 3px;
                height: 18px;
            }

            .meet-selector {
                flex-direction: row;
                align-items: center;
            }

            .meet-selector label {
                font-size: 0.75rem;
            }

            .meet-selector select {
                min-width: 180px;
                padding: 5px 10px;
                font-size: 0.85rem;
            }

            .meet-info {
                display: none;
            }

            .stats-row {
                display: none;
            }

            /* Compact legend for landscape */
            .card > div[style*="margin-bottom: 16px"] {
                margin-bottom: 6px !important;
                font-size: 0.7rem;
            }

            .card > div[style*="margin-bottom: 16px"] span[style*="width: 16px"] {
                width: 10px !important;
                height: 10px !important;
            }

            .table-container {
                max-height: calc(100vh - 100px);
                min-height: 120px;
            }

            th, td {
                padding: 5px 6px;
                font-size: 0.75rem;
            }

            .athlete-name {
                font-size: 0.8rem;
            }

            .level-badge {
                padding: 2px 5px;
                font-size: 0.7rem;
            }

            .score-cell .score-value {
                font-size: 0.8rem;
                padding: 2px 4px;
            }
        }

        /* Small phones */
        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 16px;
                border-radius: 12px;
            }

            .card-title {
                font-size: 1rem;
            }

            .table-container {
                margin: 0 -16px;
                padding: 0 16px;
            }

            table {
                min-width: 600px;
            }

            .nav-links {
                flex-direction: column;
                gap: 8px;
            }
        }

        /* Print styles */
        @media print {
            body { background: white; color: black; }
            .card { box-shadow: none; border: 1px solid #ddd; }
            .meet-selector, .nav-link, .filter-tabs { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Meet Scores</h1>
            <p>Meet scores from competitions</p>
            <div class="nav-links" style="display: flex; justify-content: center; gap: 24px;">
                <a href="/" class="nav-link">← Score Entry</a>
                <a href="/meet-averages" class="nav-link">Meet Averages →</a>
            </div>
        </header>

        <div class="card">
            <div class="card-header">
                <div class="card-title">Meet Results</div>
                <div class="meet-selector">
                    <label for="meetSelect">Select Meet:</label>
                    <select id="meetSelect" onchange="loadMeetScores()">
                        <option value="">Loading meets...</option>
                    </select>
                </div>
            </div>

            <div class="meet-info" id="meetInfo" style="display: none;">
                <div class="meet-info-item">
                    <span class="meet-info-label">Meet</span>
                    <span class="meet-info-value" id="meetName">-</span>
                </div>
                <div class="meet-info-item">
                    <span class="meet-info-label">Date</span>
                    <span class="meet-info-value" id="meetDate">-</span>
                </div>
                <div class="meet-info-item">
                    <span class="meet-info-label">Competition Year</span>
                    <span class="meet-info-value" id="compYear">-</span>
                </div>
            </div>

            <div class="stats-row" id="statsRow" style="display: none;">
                <div class="stat-card">
                    <div class="stat-value" id="seasonBests">0</div>
                    <div class="stat-label">Season Bests</div>
                </div>
                <div class="stat-card" style="border: 1px solid rgba(94, 250, 255, 0.2);">
                    <div class="stat-value" id="levelBests" style="color: #5efaff;">0</div>
                    <div class="stat-label">Level Bests</div>
                </div>
                <div class="stat-card" style="border: 1px solid rgba(48, 209, 88, 0.25);">
                    <div class="stat-value" id="totalImprovement" style="color: var(--accent-success);">0</div>
                    <div class="stat-label">Total Best Improvement</div>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px;">
                <div id="meetLegendRow" style="display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.85rem; color: var(--text-secondary);"></div>
                <div class="toggle-row" id="meetHighlightToggle"></div>
            </div>


            <div id="content">
                <div class="loading">
                    <p>Loading meet scores...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/shared.js"></script>
    <script>
        let allScores = [];
        let currentAthleteData = null;
        let highlightMode = 'bests';
        const EVENTS = ['Vault', 'Bars', 'Beam', 'Floor', 'All Around'];

        // --- Highlight mode ---

        function renderMeetHighlightToggle() {
            document.getElementById('meetHighlightToggle').innerHTML = `
                <button class="toggle-btn ${highlightMode === 'bests' ? 'active' : ''}" onclick="setMeetHighlightMode('bests')">Bests</button>
                <button class="toggle-btn ${highlightMode === 'placements' ? 'active' : ''}" onclick="setMeetHighlightMode('placements')">Placements</button>
            `;
        }

        function setMeetHighlightMode(mode) {
            highlightMode = mode;
            renderMeetHighlightToggle();
            renderMeetLegend();
            if (currentAthleteData) renderTable(currentAthleteData);
        }

        function renderMeetLegend() {
            const el = document.getElementById('meetLegendRow');
            if (highlightMode === 'bests') {
                el.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 16px; height: 16px; background: rgba(255, 215, 0, 0.2); border-radius: 4px; border: 2px solid var(--accent-gold);"></span><span>Season Best</span></div>
                    <div style="display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 16px; height: 16px; background: #4ebbdc; border-radius: 4px;"></span><span>Level Best (returning at level)</span></div>`;
            } else {
                el.innerHTML = '';
            }
        }

        function formatMeetLabel(meet) {
            if (meet.date_count > 1) {
                const d1 = new Date(meet.earliest_date.includes?.('T') ? meet.earliest_date : meet.earliest_date + 'T00:00:00');
                const d2 = new Date(meet.latest_date.includes?.('T') ? meet.latest_date : meet.latest_date + 'T00:00:00');
                const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                if (!isNaN(d1) && !isNaN(d2)) return `${meet.name} (${fmt(d1)} – ${fmt(d2)})`;
            }
            return `${meet.name} (${formatDate(meet.earliest_date)})`;
        }

        async function loadMeets() {
            try {
                const response = await fetch('/api/meets');
                const meets = await response.json();
                
                const select = document.getElementById('meetSelect');
                select.innerHTML = '';
                
                if (meets.length === 0) {
                    select.innerHTML = '<option value="">No meets found</option>';
                    return;
                }
                
                meets.forEach((meet, index) => {
                    const option = document.createElement('option');
                    option.value = JSON.stringify({name: meet.name, comp_year: meet.comp_year});
                    option.textContent = formatMeetLabel(meet);
                    if (index === 0) option.selected = true;
                    select.appendChild(option);
                });
                
                loadMeetScores();
            } catch (error) {
                console.error('Error loading meets:', error);
                document.getElementById('meetSelect').innerHTML = '<option value="">Error loading meets</option>';
            }
        }

        async function loadMeetScores() {
            const select = document.getElementById('meetSelect');
            const value = select.value;
            
            if (!value) return;
            
            const meet = JSON.parse(value);
            
            document.getElementById('content').innerHTML = '<div class="loading"><p>Loading scores...</p></div>';
            
            try {
                const response = await fetch(`/api/meet_scores?meet_name=${encodeURIComponent(meet.name)}&comp_year=${encodeURIComponent(meet.comp_year)}`);
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('content').innerHTML = `<div class="empty-state"><h3>Error</h3><p>${data.error}</p></div>`;
                    return;
                }
                
                // Update meet info
                document.getElementById('meetInfo').style.display = 'flex';
                document.getElementById('meetName').textContent = data.meet_name;
                document.getElementById('meetDate').textContent = formatMeetDates(data.meet_dates);
                document.getElementById('compYear').textContent = data.comp_year;
                
                allScores = data.scores;
                
                // Group by athlete
                const athleteScores = groupByAthlete(allScores);
                const athleteData = Object.entries(athleteScores);
                
                // Calculate stats
                let seasonBestCount = 0;
                let levelBestCount = 0;
                let totalImprovement = 0;
                
                allScores.forEach(s => {
                    if (s.score === null) return;
                    if (s.is_alltime_pb) {
                        levelBestCount++;
                        if (s.alltime_improvement != null) totalImprovement += parseFloat(s.alltime_improvement);
                    } else if (s.is_year_pb) {
                        seasonBestCount++;
                        if (s.year_improvement != null) totalImprovement += parseFloat(s.year_improvement);
                    }
                });
                
                document.getElementById('statsRow').style.display = 'grid';
                document.getElementById('seasonBests').textContent = seasonBestCount;
                document.getElementById('levelBests').textContent = levelBestCount;
                const improvementRounded = Math.round(totalImprovement * 1000) / 1000;
                document.getElementById('totalImprovement').textContent = '+' + improvementRounded.toFixed(3);
                
                currentAthleteData = athleteData;
                renderTable(athleteData);
            } catch (error) {
                console.error('Error loading scores:', error);
                document.getElementById('content').innerHTML = '<div class="empty-state"><h3>Error</h3><p>Failed to load scores</p></div>';
            }
        }

        function groupByAthlete(scores) {
            const grouped = {};
            scores.forEach(s => {
                if (!grouped[s.athlete]) {
                    grouped[s.athlete] = [];
                }
                grouped[s.athlete].push(s);
            });
            return grouped;
        }

        function renderTable(athleteData) {
            if (athleteData.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <h3>No Scores</h3>
                        <p>No scores found for this meet</p>
                    </div>
                `;
                return;
            }
            
            // Sort by level, then by athlete name
            athleteData.sort((a, b) => {
                const levelA = a[1][0].level;
                const levelB = b[1][0].level;
                const levelDiff = getLevelSortOrder(levelA) - getLevelSortOrder(levelB);
                if (levelDiff !== 0) return levelDiff;
                return a[0].localeCompare(b[0]);
            });
            
            let html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Athlete</th>
                                <th>Level</th>
                                <th>Vault</th>
                                <th>Bars</th>
                                <th>Beam</th>
                                <th>Floor</th>
                                <th>AA</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            athleteData.forEach(([athlete, scores]) => {
                const level = scores[0].level;
                const levelColor = getLevelColor(level);
                
                // Create a map of event -> score data
                const eventMap = {};
                scores.forEach(s => {
                    eventMap[s.event] = s;
                });
                
                html += `
                    <tr>
                        <td><a href="/athlete?name=${encodeURIComponent(athlete)}" class="athlete-link"><span class="athlete-name" style="color: ${levelColor.text}; background: ${levelColor.bg};">${athlete}</span></a></td>
                        <td class="level-col"><span class="level-badge" style="color: ${levelColor.text}; background: ${levelColor.bg};">${level}</span></td>
                `;
                
                EVENTS.forEach(event => {
                    const s = eventMap[event];
                    if (s && s.score !== null) {
                        html += renderScoreCell(s);
                    } else {
                        html += `<td class="no-pb">—</td>`;
                    }
                });
                
                html += '</tr>';
            });
            
            html += '</tbody></table></div>';
            
            document.getElementById('content').innerHTML = html;
        }

        function renderScoreCell(s) {
            // Placement mode: no PB highlight, show placement badge
            if (highlightMode === 'placements') {
                let badgeHtml = '';
                if (s.place) {
                    const cls = s.place === 1 ? 'gold' : s.place === 2 ? 'silver' : s.place === 3 ? 'bronze' : 'other';
                    badgeHtml = `<span class="place-badge ${cls}">${getPlaceDisplay(s.place)}</span>`;
                }
                return `<td class="score-cell"><span class="score-value">${formatScoreHtml(s.score)}</span>${badgeHtml}</td>`;
            }

            // Bests mode: original behavior
            let cellClass = 'score-cell';
            const isReturning = !s.is_first_year_at_level;
            
            const actualSeasonBest = (s.year_best != null && s.year_best > s.score) ? s.year_best : s.score;
            const seasonImprovement = s.year_improvement != null ? formatScoreDisplay(s.year_improvement) : null;
            
            let gridRows = '';
            gridRows += `<span class="label">Season Best</span><span class="score-val">${formatScoreDisplay(actualSeasonBest)}</span>`;
            gridRows += seasonImprovement ? `<span class="improvement">${seasonImprovement}</span>` : '<span class="empty-cell"></span>';
            
            if (isReturning && (s.alltime_best != null || s.is_alltime_pb)) {
                const levelScoreDisplay = s.is_alltime_pb ? formatScoreDisplay(s.score) : formatScoreDisplay(s.alltime_best);
                const levelImprovement = s.is_alltime_pb && s.alltime_improvement != null ? formatScoreDisplay(s.alltime_improvement) : null;
                gridRows += `<span class="label">Level Best</span><span class="score-val">${levelScoreDisplay}</span>`;
                gridRows += levelImprovement ? `<span class="improvement">${levelImprovement}</span>` : '<span class="empty-cell"></span>';
            }
            
            if (s.is_alltime_pb) cellClass += ' alltime-pb';
            else if (s.is_year_pb) cellClass += ' year-pb';
            
            return `
                <td class="${cellClass}" onmouseenter="positionTooltip(event)">
                    <span class="score-value">${formatScoreHtml(s.score)}</span>
                    <div class="tooltip">
                        <div class="tooltip-grid">
                            ${gridRows}
                        </div>
                    </div>
                </td>
            `;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderMeetHighlightToggle();
            renderMeetLegend();
            loadMeets();
        });
    </script>
</body>
</html>
