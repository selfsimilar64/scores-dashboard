<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athlete Profile - Gymfest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/shared.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

        /* ---- Header ---- */
        header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 8px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
            letter-spacing: -0.02em;
        }

        /* ---- Athlete search ---- */
        .athlete-selector {
            position: relative;
            display: inline-block;
        }

        .search-wrapper {
            position: relative;
            display: inline-block;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .athlete-search {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px 10px 34px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-primary);
            width: 300px;
            outline: none;
            transition: border-color 0.15s;
            text-align: left;
            box-shadow: var(--shadow-sm);
        }

        .athlete-search:focus {
            border-color: var(--accent-interactive);
        }

        .athlete-search::placeholder { color: var(--text-muted); }

        .athlete-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-top: 4px;
            max-height: 260px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: var(--shadow-md);
        }

        .athlete-dropdown.open { display: block; }

        .athlete-option {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.88rem;
            color: var(--text-primary);
            transition: background 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .athlete-option:last-child { border-bottom: none; }
        .athlete-option:hover { background: rgba(61, 90, 128, 0.05); }

        .athlete-option .option-level {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
        }

        /* ---- Athlete info ---- */
        .athlete-info-section {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .athlete-info {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-wrap: wrap;
        }

        .athlete-info .name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .athlete-info .detail {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .athlete-info .detail-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 500;
        }

        .athlete-info .detail-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .level-badge { font-size: 0.85rem; }

        .level-history {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .level-history-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            white-space: nowrap;
        }

        /* ---- Section headings ---- */
        .section-heading {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
            letter-spacing: -0.01em;
        }

        /* ---- Scores section ---- */
        .scores-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .scores-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ---- Legend ---- */
        .legend-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-swatch {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        /* ---- Table ---- */
        .table-container {
            overflow: auto;
            max-height: calc(100vh - 420px);
            min-height: 200px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 14px;
            text-align: left;
        }

        th {
            background: var(--bg-surface);
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        thead tr:first-child th:first-child { border-radius: 7px 0 0 0; }
        thead tr:first-child th:last-child { border-radius: 0 7px 0 0; }

        th:first-child, td:first-child {
            white-space: nowrap;
            width: 1%;
        }

        td {
            font-size: 0.92rem;
        }

        tbody tr:nth-child(even) {
            background: var(--bg-row-alt);
        }

        tbody tr:hover td {
            background: rgba(61, 90, 128, 0.04);
        }

        .meet-name-cell {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ---- Comp year separator ---- */
        .comp-year-row td {
            background: var(--bg-page);
            font-weight: 600;
            font-size: 0.72rem;
            color: var(--accent-interactive);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 7px 14px;
            border-bottom: 1px solid var(--border-color);
        }

        /* ---- Chart section ---- */
        .chart-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .chart-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            aspect-ratio: 5 / 3;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
        }

        /* ---- Loading / empty ---- */
        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .empty-state p {
            font-size: 0.88rem;
        }

        /* ---- Shimmer ---- */
        @keyframes shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }

        .shimmer-line {
            border-radius: 4px;
            background: linear-gradient(90deg, var(--bg-row-alt) 25%, rgba(0,0,0,0.03) 50%, var(--bg-row-alt) 75%);
            background-size: 800px 100%;
            animation: shimmer 1.8s ease-in-out infinite;
        }

        /* ---- Responsive ---- */
        @media (max-width: 640px) {
            .container { padding: 16px 14px; }
            header h1 { font-size: 1.2rem; }
            .athlete-info .name { font-size: 1.25rem; }
            .athlete-search { width: 260px; }
            .athlete-dropdown { width: 260px; }
            .chart-container { aspect-ratio: auto; height: 300px; }
            .scores-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="athlete-selector" id="athleteSelector">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="athleteSearch" class="athlete-search" placeholder="Search athletes..." autocomplete="off">
                </div>
                <div class="athlete-dropdown" id="athleteDropdown"></div>
            </div>
        </header>

        <!-- Info -->
        <div class="athlete-info-section" id="infoCard" style="display: none;">
            <div class="athlete-info" id="athleteInfo"></div>
        </div>

        <!-- Scores -->
        <div>
            <div class="scores-header">
                <h2 class="section-heading" style="margin-bottom: 0;">Scores</h2>
                <div class="scores-controls">
                    <div class="toggle-row" id="toggleRow" style="display: none;"></div>
                    <div class="toggle-row" id="highlightToggle"></div>
                </div>
            </div>

            <div class="legend-row" id="legendRow"></div>

            <div id="scoresContent">
                <div class="loading"><p>Loading scores...</p></div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-section">
            <h2 class="section-heading">Score Progression</h2>
            <div class="chart-tabs" id="chartTabs"></div>
            <div class="chart-container">
                <canvas id="scoreChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Bottom tab bar -->
    <nav class="tab-bar">
        <a href="/">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            <span>Entry</span>
        </a>
        <a href="/meet-scores">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
            </svg>
            <span>Scores</span>
        </a>
        <a href="/meet-averages">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            <span>Averages</span>
        </a>
        <a href="/attendance">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>Attendance</span>
        </a>
    </nav>

    <script src="/shared.js"></script>
    <script>
        const EVENTS = ['Vault', 'Bars', 'Beam', 'Floor', 'All Around'];
        const EVENT_COLORS = {
            'Vault': '#c1292e',
            'Bars': '#3d5a80',
            'Beam': '#b8860b',
            'Floor': '#2d6a4f',
            'All Around': '#7c5cbf'
        };

        let currentData = null;
        let chart = null;
        let showAllLevels = false;
        let selectedEvent = 'Vault';
        let highlightMode = 'bests';
        let allAthletes = [];

        // --- Athlete selector ---

        async function loadAthleteList() {
            try {
                const res = await fetch('/api/athletes?active=false');
                allAthletes = await res.json();
            } catch (e) { console.error('Failed to load athletes', e); }
        }

        let searchDebounceTimer = null;

        function setupAthleteSearch() {
            const input = document.getElementById('athleteSearch');
            const dropdown = document.getElementById('athleteDropdown');
            const currentName = getAthleteName();
            if (currentName) input.value = currentName;

            input.addEventListener('focus', () => {
                input.select();
                filterAthletes(input.value);
                dropdown.classList.add('open');
            });
            input.addEventListener('input', () => {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    filterAthletes(input.value);
                    dropdown.classList.add('open');
                }, 150);
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { dropdown.classList.remove('open'); input.blur(); }
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.athlete-selector')) dropdown.classList.remove('open');
            });
        }

        function filterAthletes(query) {
            const dropdown = document.getElementById('athleteDropdown');
            const q = query.toLowerCase().trim();
            const filtered = q ? allAthletes.filter(a => a.name.toLowerCase().includes(q)) : allAthletes;
            const limited = filtered.slice(0, 25);
            if (limited.length === 0) {
                dropdown.innerHTML = '<div class="athlete-option" style="color: var(--text-muted); cursor: default;">No matches</div>';
                return;
            }
            dropdown.innerHTML = limited.map(a => {
                const lc = getLevelColor(a.current_level || '');
                return `<div class="athlete-option" onclick="navigateToAthlete('${a.name.replace(/'/g, "\\'")}')">
                    <span>${a.name}</span>
                    ${a.current_level ? `<span class="option-level" style="color: ${lc.text}; background: ${lc.bg};">${a.current_level}</span>` : ''}
                </div>`;
            }).join('');
        }

        function navigateToAthlete(name) {
            const url = new URL(window.location);
            url.searchParams.set('name', name);
            window.history.pushState({}, '', url);
            document.getElementById('athleteSearch').value = name;
            document.getElementById('athleteDropdown').classList.remove('open');
            showAllLevels = false;
            currentData = null;
            showLoadingShimmer();
            loadProfile();
        }

        // --- Shimmer loading ---

        function showLoadingShimmer() {
            document.getElementById('scoresContent').innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 8px; padding: 8px 0;">
                    <div class="shimmer-line" style="width: 100%; height: 36px;"></div>
                    <div class="shimmer-line" style="width: 100%; height: 28px;"></div>
                    <div class="shimmer-line" style="width: 96%; height: 28px;"></div>
                    <div class="shimmer-line" style="width: 92%; height: 28px;"></div>
                    <div class="shimmer-line" style="width: 88%; height: 28px;"></div>
                </div>`;
            if (chart) { chart.destroy(); chart = null; }
        }

        // --- Highlight mode toggle ---

        function renderHighlightToggle() {
            document.getElementById('highlightToggle').innerHTML = `
                <button class="toggle-btn ${highlightMode === 'bests' ? 'active' : ''}" onclick="setHighlightMode('bests')">Bests</button>
                <button class="toggle-btn ${highlightMode === 'placements' ? 'active' : ''}" onclick="setHighlightMode('placements')">Placements</button>
            `;
        }

        function setHighlightMode(mode) {
            highlightMode = mode;
            renderHighlightToggle();
            renderLegend();
            if (currentData) renderScoresTable(currentData);
        }

        function renderLegend() {
            const el = document.getElementById('legendRow');
            if (highlightMode === 'bests') {
                el.innerHTML = `
                    <div class="legend-item"><span class="legend-swatch" style="background: var(--accent-gold-bg);"></span><span>Season Best</span></div>
                    <div class="legend-item"><span class="legend-swatch" style="background: var(--accent-gold-bg); display: flex; align-items: center; justify-content: center; color: var(--accent-gold-bright); font-size: 8px;">&#9733;</span><span>Level Best</span></div>`;
            } else {
                el.innerHTML = '';
            }
        }

        // --- Load data ---

        function getAthleteName() {
            const params = new URLSearchParams(window.location.search);
            return params.get('name');
        }

        async function loadProfile() {
            const name = getAthleteName();
            if (!name) {
                document.getElementById('scoresContent').innerHTML = '<div class="empty-state"><h3>No Athlete Selected</h3><p>Search for an athlete above, or navigate here from the Meet Scores page.</p></div>';
                document.getElementById('infoCard').style.display = 'none';
                return;
            }

            document.title = `${name} - Gymfest`;

            try {
                const url = `/api/athlete_profile?name=${encodeURIComponent(name)}${showAllLevels ? '&all_levels=true' : ''}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.error && !data.athlete) {
                    document.getElementById('scoresContent').innerHTML = `<div class="empty-state"><h3>Error</h3><p>${data.error}</p></div>`;
                    return;
                }

                currentData = data;
                renderInfoCard(data.athlete);
                renderToggle(data.athlete);
                renderScoresTable(data);
                renderChartTabs(data);
                try { renderChart(data); } catch (chartErr) { console.error('Chart error:', chartErr); }
            } catch (err) {
                console.error(err);
                document.getElementById('scoresContent').innerHTML = '<div class="empty-state"><h3>Error</h3><p>Failed to load athlete data.</p></div>';
            }
        }

        // --- Render info card ---

        function renderInfoCard(athlete) {
            const card = document.getElementById('infoCard');
            card.style.display = 'block';
            const lc = getLevelColor(athlete.level || '');

            let html = `<span class="name">${athlete.name}</span>`;

            if (athlete.level) {
                html += `<div class="detail"><span class="detail-label">Level</span><span class="detail-value"><span class="level-badge" style="color: ${lc.text}; background: ${lc.bg};">${athlete.level}</span></span></div>`;
            }

            if (athlete.level_history && athlete.level_history.length > 1) {
                const history = athlete.level_history.slice(1);
                html += `<div class="detail"><span class="detail-label">History</span><span class="detail-value level-history">`;
                history.forEach(lvl => {
                    const hlc = getLevelColor(lvl);
                    html += `<span class="level-history-badge" style="color: ${hlc.text}; background: ${hlc.bg};">${lvl}</span>`;
                });
                html += '</span></div>';
            }

            if (athlete.age !== null && athlete.age !== undefined) {
                html += `<div class="detail"><span class="detail-label">Age</span><span class="detail-value">${athlete.age}</span></div>`;
            }
            if (athlete.birthday) {
                html += `<div class="detail"><span class="detail-label">Birthday</span><span class="detail-value">${formatDate(athlete.birthday)}</span></div>`;
            }

            document.getElementById('athleteInfo').innerHTML = html;
        }

        // --- Render toggle ---

        function renderToggle(athlete) {
            const row = document.getElementById('toggleRow');
            const uniqueLevels = athlete.level_history ? new Set(athlete.level_history).size : 1;
            if (uniqueLevels < 2) {
                row.style.display = 'none';
                return;
            }
            row.style.display = 'flex';
            row.innerHTML = `
                <button class="toggle-btn ${!showAllLevels ? 'active' : ''}" onclick="setScope(false)">Current Level</button>
                <button class="toggle-btn ${showAllLevels ? 'active' : ''}" onclick="setScope(true)">All Levels</button>
            `;
        }

        function setScope(all) {
            showAllLevels = all;
            document.querySelectorAll('#toggleRow .toggle-btn').forEach(btn => {
                const isAllBtn = btn.textContent.trim() === 'All Levels';
                btn.classList.toggle('active', all ? isAllBtn : !isAllBtn);
            });
            showLoadingShimmer();
            loadProfile();
        }

        // --- Render scores table ---

        function renderScoresTable(data) {
            const { meets, scores } = data;
            if (!scores || scores.length === 0) {
                document.getElementById('scoresContent').innerHTML = '<div class="empty-state"><h3>No Scores</h3><p>No scores found.</p></div>';
                return;
            }

            const meetMap = {};
            scores.forEach(s => {
                const key = `${s.meet_name}||${s.meet_date}`;
                if (!meetMap[key]) meetMap[key] = { name: s.meet_name, date: s.meet_date, comp_year: s.comp_year, level: s.level, events: {} };
                meetMap[key].events[s.event] = s;
            });

            const meetRows = meets.map(m => meetMap[`${m.name}||${m.date}`]).filter(Boolean).reverse();
            const showLevel = showAllLevels;
            const colCount = showLevel ? 7 : 6;
            const compYears = new Set(meetRows.map(m => m.comp_year));
            const showSeparators = compYears.size > 1;

            let html = `<div class="table-container"><table><thead><tr>
                <th>Meet</th>${showLevel ? '<th>Level</th>' : ''}
                <th>Vault</th><th>Bars</th><th>Beam</th><th>Floor</th><th>AA</th>
            </tr></thead><tbody>`;

            let lastCompYear = null;

            meetRows.forEach(meet => {
                if (showSeparators && meet.comp_year !== lastCompYear) {
                    lastCompYear = meet.comp_year;
                    html += `<tr class="comp-year-row"><td colspan="${colCount}">Season ${meet.comp_year}</td></tr>`;
                }

                const mlc = showLevel ? getLevelColor(meet.level) : null;
                html += `<tr>
                    <td class="meet-name-cell">${meet.name}</td>
                    ${showLevel ? `<td><span class="level-badge" style="color: ${mlc.text}; background: ${mlc.bg};">${meet.level}</span></td>` : ''}`;

                EVENTS.forEach(event => {
                    const s = meet.events[event];
                    if (s && s.score !== null) {
                        html += renderScoreCell(s);
                    } else {
                        html += '<td class="no-score">\u2014</td>';
                    }
                });

                html += '</tr>';
            });

            html += '</tbody></table></div>';
            document.getElementById('scoresContent').innerHTML = html;
        }

        function renderScoreCell(s) {
            if (highlightMode === 'placements') {
                let badgeHtml = '';
                if (s.place) {
                    const cls = s.place === 1 ? 'gold' : s.place === 2 ? 'silver' : s.place === 3 ? 'bronze' : 'other';
                    badgeHtml = `<span class="place-badge ${cls}">${getPlaceDisplay(s.place)}</span>`;
                }
                return `<td class="score-cell"><span class="score-value">${formatScoreHtml(s.score)}</span>${badgeHtml}</td>`;
            }

            let cellClass = 'score-cell';
            const isReturning = !s.is_first_year_at_level;

            const actualSeasonBest = (s.year_best != null && s.year_best > s.score) ? s.year_best : s.score;
            const seasonImprovement = s.year_improvement != null ? formatScoreDisplay(s.year_improvement) : null;

            let gridRows = '';
            gridRows += `<span class="label">Season Best</span><span class="score-val">${formatScoreDisplay(actualSeasonBest)}</span>`;
            gridRows += seasonImprovement ? `<span class="improvement">${seasonImprovement}</span>` : '<span></span>';

            if (isReturning && (s.alltime_best != null || s.is_alltime_pb)) {
                const levelScoreDisplay = s.is_alltime_pb ? formatScoreDisplay(s.score) : formatScoreDisplay(s.alltime_best);
                const levelImprovement = s.is_alltime_pb && s.alltime_improvement != null ? formatScoreDisplay(s.alltime_improvement) : null;
                gridRows += `<span class="label">Level Best</span><span class="score-val">${levelScoreDisplay}</span>`;
                gridRows += levelImprovement ? `<span class="improvement">${levelImprovement}</span>` : '<span></span>';
            }

            if (s.is_alltime_pb) cellClass += ' alltime-pb';
            else if (s.is_year_pb) cellClass += ' year-pb';

            return `<td class="${cellClass}" tabindex="0" onmouseenter="positionTooltip(event)" onfocus="positionTooltip(event)">
                <span class="score-value">${formatScoreHtml(s.score)}</span>
                <div class="tooltip" role="tooltip"><div class="tooltip-grid">${gridRows}</div></div>
            </td>`;
        }

        // --- Chart tabs ---

        function renderChartTabs(data) {
            const tabsEl = document.getElementById('chartTabs');
            if (!data || !data.scores || data.scores.length === 0) {
                tabsEl.innerHTML = '';
                return;
            }
            const chartLevel = data.athlete?.level;
            const chartScores = chartLevel ? data.scores.filter(s => s.level === chartLevel) : data.scores;
            const availableEvents = EVENTS.filter(event =>
                chartScores.some(s => s.event === event && s.score !== null)
            );
            if (availableEvents.length > 0 && !availableEvents.includes(selectedEvent)) {
                selectedEvent = availableEvents[0];
            }
            tabsEl.innerHTML = availableEvents.map(event => {
                const label = event === 'All Around' ? 'AA (avg)' : event;
                const active = selectedEvent === event;
                return `<button class="toggle-btn${active ? ' active' : ''}" onclick="selectEvent('${event}')">${label}</button>`;
            }).join('');
        }

        function selectEvent(event) {
            selectedEvent = event;
            renderChartTabs(currentData);
            renderChart(currentData);
        }

        // --- Chart plugins ---

        const compYearBgPlugin = {
            id: 'compYearBg',
            beforeDraw(chart) {
                const sections = chart.options.plugins?.compYearBg?.sections;
                if (!sections || sections.length <= 1) return;
                const { ctx, chartArea: { left, right, top, bottom }, scales: { x } } = chart;
                const labelCount = chart.data.labels.length;
                if (labelCount === 0) return;
                const halfStep = labelCount > 1
                    ? (x.getPixelForValue(1) - x.getPixelForValue(0)) / 2
                    : (right - left) / 2;
                sections.forEach(section => {
                    const x1 = Math.max(x.getPixelForValue(section.startIndex) - halfStep, left);
                    const x2 = Math.min(x.getPixelForValue(section.endIndex) + halfStep, right);
                    ctx.save();
                    ctx.fillStyle = section.color;
                    ctx.fillRect(x1, top, x2 - x1, bottom - top);
                    ctx.fillStyle = 'rgba(60, 60, 70, 0.5)';
                    ctx.font = "600 11px 'Plus Jakarta Sans'";
                    ctx.textAlign = 'center';
                    ctx.fillText(section.label, (x1 + x2) / 2, top + 16);
                    ctx.restore();
                });
            }
        };

        const lollipopPlugin = {
            id: 'lollipop',
            afterDatasetsDraw(chart) {
                const averages = chart.options.plugins?.lollipop?.averages;
                if (!averages || averages.length === 0) return;
                const meta = chart.getDatasetMeta(0);
                if (!meta || !meta.data.length) return;
                const { ctx, scales: { x, y }, chartArea: { left, right } } = chart;
                const labelCount = chart.data.labels.length;
                if (labelCount === 0) return;
                const halfStep = labelCount > 1
                    ? (x.getPixelForValue(1) - x.getPixelForValue(0)) / 2
                    : (right - left) / 2;

                averages.forEach(avg => {
                    if (avg.value == null) return;
                    const yPixel = y.getPixelForValue(avg.value);
                    const x1 = Math.max(meta.data[avg.startIndex].x - halfStep, left);
                    const x2 = Math.min(meta.data[avg.endIndex].x + halfStep, right);

                    for (let i = avg.startIndex; i <= avg.endIndex; i++) {
                        const val = chart.data.datasets[0].data[i];
                        if (val == null) continue;
                        const point = meta.data[i];
                        ctx.save();
                        ctx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([]);
                        ctx.beginPath();
                        ctx.moveTo(point.x, point.y);
                        ctx.lineTo(point.x, yPixel);
                        ctx.stroke();
                        ctx.restore();
                    }

                    ctx.save();
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.18)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 4]);
                    ctx.beginPath();
                    ctx.moveTo(x1, yPixel);
                    ctx.lineTo(x2, yPixel);
                    ctx.stroke();
                    ctx.restore();

                    ctx.save();
                    ctx.fillStyle = 'rgba(100, 100, 110, 0.6)';
                    ctx.font = "500 10px 'Plus Jakarta Sans'";
                    ctx.textAlign = 'right';
                    ctx.fillText(`avg ${formatScoreDisplay(avg.value)}`, x2 - 4, yPixel - 5);
                    ctx.restore();
                });
            }
        };

        Chart.register(compYearBgPlugin, lollipopPlugin);

        // --- Render chart ---

        function renderChart(data) {
            const { meets, scores } = data;
            if (!scores || scores.length === 0) return;

            const chartLevel = data.athlete?.level;
            const chartScores = chartLevel ? scores.filter(s => s.level === chartLevel) : scores;
            const chartMeetKeys = new Set(chartScores.map(s => `${s.meet_name}||${s.meet_date}`));
            const chartMeets = meets.filter(m => chartMeetKeys.has(`${m.name}||${m.date}`));

            if (chartScores.length === 0) return;

            const event = selectedEvent;
            const isAA = event === 'All Around';

            const meetMap = {};
            chartScores.forEach(s => {
                const key = `${s.meet_name}||${s.meet_date}`;
                if (!meetMap[key]) meetMap[key] = { compYear: s.comp_year };
                meetMap[key][s.event] = s.score;
            });

            const orderedMeets = chartMeets.map(m => ({
                label: m.name, key: `${m.name}||${m.date}`, compYear: m.comp_year
            }));
            const labels = orderedMeets.map(m => m.label);

            const dataPoints = orderedMeets.map(m => {
                const val = meetMap[m.key]?.[event];
                if (val == null) return null;
                return isAA ? Math.round((val / 4) * 1000) / 1000 : val;
            });

            const validPoints = dataPoints.filter(v => v !== null);
            const dataMin = validPoints.length > 0 ? Math.min(...validPoints) : 7;
            const yMin = Math.max(0, Math.floor((dataMin - 0.75) * 2) / 2);

            const sectionColors = [
                'rgba(61, 90, 128, 0.25)',
                'rgba(45, 106, 79, 0.25)',
                'rgba(124, 92, 191, 0.22)',
                'rgba(184, 134, 11, 0.22)'
            ];
            const sections = [];
            let currentCompYear = null;
            orderedMeets.forEach((m, i) => {
                const cy = meetMap[m.key]?.compYear || m.compYear;
                if (cy !== currentCompYear) {
                    currentCompYear = cy;
                    sections.push({
                        startIndex: i, endIndex: i, compYear: cy,
                        label: `Season ${cy}`,
                        color: sectionColors[sections.length % sectionColors.length]
                    });
                } else if (sections.length > 0) {
                    sections[sections.length - 1].endIndex = i;
                }
            });

            const averages = sections.map(section => {
                const pts = [];
                for (let i = section.startIndex; i <= section.endIndex; i++) {
                    if (dataPoints[i] != null) pts.push(dataPoints[i]);
                }
                return {
                    value: pts.length > 0 ? Math.round((pts.reduce((a, b) => a + b, 0) / pts.length) * 1000) / 1000 : null,
                    startIndex: section.startIndex,
                    endIndex: section.endIndex
                };
            }).filter(a => a.value !== null);

            if (chart) chart.destroy();

            const ctx = document.getElementById('scoreChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: isAA ? 'AA (avg)' : event,
                        data: dataPoints,
                        borderColor: '#1c1c1e',
                        borderWidth: 3,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#1c1c1e',
                        pointBorderWidth: 2.5,
                        tension: 0.25,
                        spanGaps: true,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#ffffff',
                            titleColor: '#1c1c1e',
                            bodyColor: '#1c1c1e',
                            borderColor: '#e5e4e1',
                            borderWidth: 1,
                            titleFont: { family: "'Plus Jakarta Sans'", size: 13, weight: '600' },
                            bodyFont: { family: "'Plus Jakarta Sans'", size: 13, weight: '600' },
                            padding: 10,
                            cornerRadius: 6,
                            boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
                            callbacks: {
                                label: function(ctx) {
                                    const val = ctx.parsed.y;
                                    if (val == null) return '';
                                    return `${ctx.dataset.label}: ${formatScoreDisplay(val)}`;
                                }
                            }
                        },
                        compYearBg: {
                            sections: sections.length > 1 ? sections : []
                        },
                        lollipop: { averages }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#6b6b73',
                                font: { family: "'Plus Jakarta Sans'", size: 12, weight: '500' },
                                maxRotation: 45
                            },
                            grid: { color: 'rgba(0, 0, 0, 0.05)' }
                        },
                        y: {
                            ticks: {
                                color: '#6b6b73',
                                font: { family: "'Plus Jakarta Sans'", size: 12 },
                                callback: v => formatScoreDisplay(v)
                            },
                            grid: { color: 'rgba(0, 0, 0, 0.05)' },
                            min: yMin,
                            max: 10
                        }
                    }
                }
            });
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            renderHighlightToggle();
            renderLegend();
            loadAthleteList().then(() => setupAthleteSearch());
            const name = getAthleteName();
            if (name) {
                document.getElementById('athleteSearch').value = name;
                showLoadingShimmer();
            }
            loadProfile();
        });
    </script>
</body>
</html>
